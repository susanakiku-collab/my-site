<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THEMIS AI Dispatch</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* dashboard.js と完全一致させるための最低限の補助 */
    .page-wrap{
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .brand{
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title{
      font-size: 28px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .brand-sub{
      font-size: 13px;
      opacity: .72;
    }

    .filters{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters input,
    .filters select,
    .filters button{
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      padding: 0 14px;
      font-size: 14px;
    }

    .filters button{
      cursor: pointer;
      font-weight: 700;
    }

    .status-bar{
      margin-bottom: 20px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .main-grid{
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel{
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }

    .panel-title{
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    #planList,
    #vehicleBoard{
      min-height: 160px;
    }

    #vehicleBoard{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .plan-card,
    .vehicle-card{
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .vehicle-card{
      margin-bottom: 0;
    }

    .plan-top,
    .vehicle-card-head,
    .vehicle-stop-head{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .plan-hour,
    .plan-cast,
    .vehicle-name{
      font-weight: 800;
    }

    .plan-address,
    .vehicle-stop-address{
      margin-top: 8px;
      line-height: 1.5;
      font-size: 14px;
      word-break: break-word;
    }

    .plan-meta,
    .plan-note,
    .vehicle-sub,
    .vehicle-stop-meta{
      margin-top: 8px;
      font-size: 12px;
      opacity: .75;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .vehicle-card-body{
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .vehicle-stop{
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 12px;
    }

    .vehicle-stop-cast{
      margin-top: 6px;
      font-weight: 700;
    }

    .vehicle-stop-area{
      margin-top: 4px;
      font-size: 13px;
      opacity: .8;
    }

    .badge-hour,
    .badge-order,
    .plan-area{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(45,108,223,.15);
      border: 1px solid rgba(45,108,223,.22);
    }

    .empty,
    .empty-mini{
      padding: 20px;
      text-align: center;
      opacity: .65;
    }

    @media (max-width: 980px){
      .main-grid{
        grid-template-columns: 1fr;
      }

      #vehicleBoard{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <header class="topbar">
      <div class="brand">
        <div class="brand-title">THEMIS AI Dispatch</div>
        <div class="brand-sub">予定表 → AI自動配車 → 実際の送り取り込み</div>
      </div>

      <div class="filters">
        <input type="date" id="planDate" />

        <select id="planHour">
          <option value="">全時間帯</option>
          <option value="18">18時</option>
          <option value="19">19時</option>
          <option value="20">20時</option>
          <option value="21">21時</option>
          <option value="22">22時</option>
          <option value="23">23時</option>
          <option value="24">24時</option>
          <option value="25">25時</option>
          <option value="26">26時</option>
          <option value="27">27時</option>
          <option value="28">28時</option>
        </select>

        <button id="btnLoadPlans" type="button">予定表読込</button>
        <button id="btnAutoDispatch" type="button">AI自動配車</button>
        <button id="btnImportDispatch" type="button">実際の送りへ取り込み</button>
      </div>
    </header>

    <div id="statusMsg" class="status-bar">待機中...</div>

    <main class="main-grid">
      <section class="panel">
        <div class="panel-title">予定表</div>
        <div id="planList"></div>
      </section>

      <section class="panel">
        <div class="panel-title">車両別配車ボード</div>
        <div id="vehicleBoard"></div>
      </section>
    </main>
  </div>

  <script>
    /* 必要ならここに直接入れてください */
    window.SUPABASE_URL = "YOUR_SUPABASE_URL";
    window.SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
  </script>

  <script src="./dashboard.js"></script>
</body>
</html>
