<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THEMIS AI Dispatch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-wrap">
        <h1 class="app-title">THEMIS AI Dispatch 🚐</h1>
        <p class="app-subtitle">配車AI / 方面クラスタリング / ルート最適化</p>
      </div>

      <div class="header-actions">
        <button id="exportAllBtn" class="btn ghost">エクスポート</button>
        <button id="importAllBtn" class="btn ghost">インポート</button>
        <button id="dangerResetBtn" class="btn danger">全削除</button>
      </div>
    </header>

    <nav class="main-tabs">
      <button class="main-tab active" data-tab="homeTab">ホーム</button>
      <button class="main-tab" data-tab="castsTab">キャスト</button>
      <button class="main-tab" data-tab="vehiclesTab">車両</button>
      <button class="main-tab" data-tab="dailyTab">当日運用</button>
      <button class="main-tab" data-tab="plansTab">予定表</button>
      <button class="main-tab" data-tab="actualTab">実際の送り</button>
    </nav>

    <main class="page-body">
      <!-- ホーム -->
      <section id="homeTab" class="page-panel active">
        <div class="panel-grid two-col">
          <section class="panel-card">
            <h2>今日の状況</h2>
            <div class="status-chips">
              <span class="chip">キャスト <span id="homeCastCount">0</span></span>
              <span class="chip">車両 <span id="homeVehicleCount">0</span></span>
              <span class="chip">予定 <span id="homePlanCount">0</span></span>
              <span class="chip">実績 <span id="homeActualCount">0</span></span>
            </div>
          </section>

          <section class="panel-card">
            <h2>クイック操作</h2>
            <div class="quick-actions">
              <button class="btn primary go-tab-btn" data-go-tab="dailyTab">当日運用</button>
              <button class="btn ghost go-tab-btn" data-go-tab="plansTab">予定表</button>
              <button class="btn ghost go-tab-btn" data-go-tab="actualTab">実績</button>
            </div>
          </section>
        </div>
      </section>

      <!-- キャスト -->
      <section id="castsTab" class="page-panel">
        <section class="panel-card">
          <h2>キャスト登録</h2>

          <div class="form-grid two-col">
            <div class="field">
              <label for="castName">氏名</label>
              <input id="castName" type="text" />
            </div>

            <div class="field">
              <label for="castDistanceKm">距離</label>
              <input id="castDistanceKm" type="number" step="0.1" />
            </div>

            <div class="field full">
              <label for="castAddress">住所</label>
              <input id="castAddress" type="text" />
            </div>

            <div class="field">
              <label for="castArea">方面</label>
              <input id="castArea" type="text" />
            </div>

            <div class="field">
              <label for="castPhone">電話</label>
              <input id="castPhone" type="text" />
            </div>

            <div class="field full">
              <label for="castMemo">メモ</label>
              <input id="castMemo" type="text" />
            </div>

            <input id="castLat" type="hidden" />
            <input id="castLng" type="hidden" />
          </div>

          <div class="action-row">
            <button id="saveCastBtn" class="btn primary">保存</button>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>名前</th>
                  <th>住所</th>
                  <th>方面</th>
                  <th>距離</th>
                  <th>メモ</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="castsTableBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <!-- 車両 -->
      <section id="vehiclesTab" class="page-panel">
        <section class="panel-card">
          <h2>車両管理</h2>

          <div class="form-grid three-col">
            <div class="field">
              <label for="vehiclePlateNumber">車両ID</label>
              <input id="vehiclePlateNumber" type="text" />
            </div>

            <div class="field">
              <label for="vehicleArea">担当方面</label>
              <input id="vehicleArea" type="text" />
            </div>

            <div class="field">
              <label for="vehicleHomeArea">帰宅方面</label>
              <input id="vehicleHomeArea" type="text" />
            </div>

            <div class="field">
              <label for="vehicleSeatCapacity">定員</label>
              <input id="vehicleSeatCapacity" type="number" />
            </div>

            <div class="field">
              <label for="vehicleDriverName">ドライバー</label>
              <input id="vehicleDriverName" type="text" />
            </div>

            <div class="field">
              <label for="vehicleLineId">LINE ID</label>
              <input id="vehicleLineId" type="text" />
            </div>

            <div class="field">
              <label for="vehicleStatus">状態</label>
              <select id="vehicleStatus">
                <option value="waiting">待機</option>
                <option value="running">稼働中</option>
                <option value="maintenance">整備中</option>
              </select>
            </div>

            <div class="field full">
              <label for="vehicleMemo">メモ</label>
              <input id="vehicleMemo" type="text" />
            </div>
          </div>

          <div class="action-row">
            <button id="saveVehicleBtn" class="btn primary">保存</button>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>車両</th>
                  <th>方面</th>
                  <th>帰宅</th>
                  <th>定員</th>
                  <th>ドライバー</th>
                  <th>月間距離</th>
                  <th>出勤日数</th>
                  <th>平均</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="vehiclesTableBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <!-- 当日運用 -->
      <section id="dailyTab" class="page-panel">
        <section class="panel-card">
          <div class="daily-header-row">
            <h2>当日運用</h2>

            <div class="daily-top-actions">
              <input type="date" id="dispatchDate" />
              <button id="optimizeBtn" class="btn primary">自動配車</button>
              <button id="copyResultBtn" class="btn ghost">コピー</button>
            </div>
          </div>

          <div id="dailyVehicleChecklist" class="vehicle-checklist"></div>

          <div class="divider"></div>

          <div id="dailyDispatchResult" class="dispatch-result-cards"></div>
        </section>
      </section>

      <!-- 予定表 -->
      <section id="plansTab" class="page-panel">
        <section class="panel-card">
          <h2>予定表</h2>

          <div class="field compact">
            <label for="planDate">日付</label>
            <input type="date" id="planDate" />
          </div>

          <div class="form-grid three-col">
            <div class="field">
              <label for="planCastSelect">キャスト</label>
              <select id="planCastSelect">
                <option value="">選択してください</option>
              </select>
            </div>

            <div class="field">
              <label for="planHour">時間</label>
              <select id="planHour">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>

            <div class="field">
              <label for="planDistanceKm">距離</label>
              <input id="planDistanceKm" type="number" step="0.1" />
            </div>

            <div class="field full">
              <label for="planAddress">住所</label>
              <input id="planAddress" type="text" />
            </div>

            <div class="field">
              <label for="planArea">方面</label>
              <input id="planArea" type="text" />
            </div>

            <div class="field">
              <label for="planNote">メモ</label>
              <input id="planNote" type="text" />
            </div>
          </div>

          <div class="action-row">
            <button id="savePlanBtn" class="btn primary">追加</button>
          </div>

          <div id="plansGroupedTable"></div>
        </section>
      </section>

      <!-- 実際の送り -->
      <section id="actualTab" class="page-panel">
        <section class="panel-card">
          <h2>実際の送り</h2>

          <div class="field compact">
            <label for="actualDate">日付</label>
            <input type="date" id="actualDate" />
          </div>

          <div class="form-grid three-col">
            <div class="field">
              <label for="planSelect">予定から選択</label>
              <select id="planSelect">
                <option value="">予定から選択</option>
              </select>
            </div>

            <div class="field">
              <label for="castSelect">キャスト</label>
              <select id="castSelect">
                <option value="">選択してください</option>
              </select>
            </div>

            <div class="field">
              <label for="actualHour">時間</label>
              <select id="actualHour">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>

            <div class="field">
              <label for="actualAddress">住所</label>
              <input id="actualAddress" type="text" />
            </div>

            <div class="field">
              <label for="actualArea">方面</label>
              <input id="actualArea" type="text" />
            </div>

            <div class="field">
              <label for="actualDistanceKm">距離</label>
              <input id="actualDistanceKm" type="number" step="0.1" />
            </div>

            <div class="field">
              <label for="actualStatus">状態</label>
              <select id="actualStatus">
                <option value="pending">pending</option>
                <option value="done">done</option>
                <option value="cancel">cancel</option>
              </select>
            </div>

            <div class="field full">
              <label for="actualNote">メモ</label>
              <input id="actualNote" type="text" />
            </div>
          </div>

          <div class="action-row">
            <button id="saveActualBtn" class="btn primary">追加</button>
            <button id="addSelectedPlanBtn" class="btn ghost">予定→追加</button>
          </div>

          <div id="actualTableWrap"></div>

          <div class="divider"></div>

          <div id="actualTimeAreaMatrix"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
