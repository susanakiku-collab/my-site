<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THEMIS AI Dispatch | Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>THEMIS AI Dispatch</h1>
      <p class="sub">配車ダッシュボード</p>
    </div>

    <div class="top-actions">
      <span id="userEmail" class="muted"></span>
      <button id="logoutBtn" class="btn danger">ログアウト</button>
    </div>
  </header>

  <main class="container">
    <nav class="tabs">
      <button class="tab active" data-tab="dispatchTab">今日の配車</button>
      <button class="tab" data-tab="plansTab">予定表</button>
      <button class="tab" data-tab="castsTab">キャスト管理</button>
      <button class="tab" data-tab="vehiclesTab">車両管理</button>
      <button class="tab" data-tab="drivingTab">走行管理</button>
      <button class="tab" data-tab="historyTab">履歴</button>
    </nav>

    <!-- 今日の配車 -->
    <section id="dispatchTab" class="tab-panel active">
      <div class="card">
        <h2>今日の配車</h2>

        <div class="grid two">
          <label>
            <span>日付</span>
            <input type="date" id="dispatchDate" />
          </label>

          <label>
            <span>担当メモ</span>
            <input type="text" id="driverName" placeholder="例: 本日担当" />
          </label>
        </div>

        <div class="row wrap">
          <button id="createDispatchBtn" class="btn">配車作成</button>
          <button id="loadDispatchBtn" class="btn secondary">配車読込</button>
          <button id="optimizeBtn" class="btn">AI配車</button>
          <button id="copyLineDispatchBtn" class="btn secondary">LINE貼り付け文コピー</button>
        </div>

        <hr />

        <h3>予定から取り込む</h3>
        <div class="grid two">
          <label class="full">
            <span>予定一覧</span>
            <select id="planSelect">
              <option value="">予定を選択してください</option>
            </select>
          </label>
        </div>

        <div class="row wrap">
          <button id="addPlanToDispatchBtn" class="btn">予定から追加</button>
        </div>

        <hr />

        <h3>予定外キャストを追加</h3>
        <div class="grid two">
          <label>
            <span>キャスト選択</span>
            <select id="castSelect">
              <option value="">選択してください</option>
            </select>
          </label>

          <label>
            <span>順番</span>
            <input type="number" id="stopOrder" min="1" value="1" />
          </label>
        </div>

        <div class="row wrap">
          <button id="addCastBtn" class="btn secondary">予定外キャスト追加</button>
        </div>

        <div id="dispatchSummary" class="summary-box muted"></div>
        <div id="dispatchList" class="list"></div>
      </div>
    </section>

    <!-- 予定表 -->
    <section id="plansTab" class="tab-panel">
      <div class="card">
        <h2>予定表</h2>

        <div class="grid two">
          <label>
            <span>予定日</span>
            <input type="date" id="planDate" />
          </label>

          <label>
            <span>時間</span>
            <select id="planHour">
              <option value="0">12</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">L</option>
            </select>
          </label>

          <label>
            <span>キャスト</span>
            <select id="planCastSelect">
              <option value="">選択してください</option>
            </select>
          </label>

          <label>
            <span>方面ブロック</span>
            <select id="planArea">
              <option value="">選択してください</option>
              <option value="A1">A1</option>
              <option value="A2">A2</option>
              <option value="B">B</option>
              <option value="C1">C1</option>
              <option value="D">D</option>
              <option value="無し">無し</option>
            </select>
          </label>

          <label class="full">
            <span>メモ</span>
            <textarea id="planNote"></textarea>
          </label>
        </div>

        <div class="row wrap">
          <button id="savePlanBtn" class="btn">予定保存</button>
          <button id="cancelPlanEditBtn" class="btn secondary hidden">編集キャンセル</button>
          <button id="loadPlansBtn" class="btn secondary">予定読込</button>
        </div>

        <div id="plansSummary" class="summary-box muted"></div>
        <div id="plansBoard" class="plans-board"></div>
      </div>
    </section>

    <!-- キャスト管理 -->
    <section id="castsTab" class="tab-panel">
      <div class="card">
        <h2>キャスト管理</h2>

        <div class="grid two">
          <label>
            <span>名前</span>
            <input type="text" id="castName" />
          </label>

          <label>
            <span>電話番号</span>
            <input type="text" id="castPhone" />
          </label>

          <label class="full">
            <span>住所</span>
            <input type="text" id="castAddress" placeholder="例: 千葉県..." />
          </label>

          <label class="full">
            <span>Google Mapsから取得した座標を貼り付け</span>
            <input type="text" id="castLatLngText" placeholder="例: 35.742891,139.876123" />
          </label>

          <label>
            <span>表示方面（自由入力）</span>
            <input type="text" id="castArea" placeholder="例: 船橋 / 柏 / 松戸" />
          </label>

          <label>
            <span>緯度</span>
            <input type="number" step="any" id="castLat" />
          </label>

          <label>
            <span>経度</span>
            <input type="number" step="any" id="castLng" />
          </label>

          <label class="full">
            <span>メモ</span>
            <textarea id="castMemo"></textarea>
          </label>
        </div>

        <div class="row wrap">
          <button id="openGoogleMapBtn" class="btn secondary">Google Mapsで確認</button>
          <button id="applyLatLngBtn" class="btn secondary">貼り付け座標を反映</button>
          <button id="saveCastBtn" class="btn">保存</button>
          <button id="cancelEditBtn" class="btn secondary hidden">編集キャンセル</button>
        </div>

        <hr />

        <h3>CSV一括取込 / 書き出し</h3>
        <p class="muted">ヘッダー例: name,phone,address,area,latitude,longitude,memo</p>

        <div class="row wrap">
          <input type="file" id="csvFileInput" accept=".csv,text/csv" />
          <button id="importCsvBtn" class="btn">CSV取込</button>
          <button id="exportCsvBtn" class="btn secondary">CSV書き出し</button>
        </div>

        <div id="castsList" class="list"></div>
      </div>
    </section>

    <!-- 車両管理 -->
    <section id="vehiclesTab" class="tab-panel">
      <div class="card">
        <h2>車両管理</h2>

        <div class="grid two">
          <label>
            <span>ナンバー</span>
            <input type="text" id="vehiclePlateNumber" placeholder="例: 柏480 あ 12-34" />
          </label>

          <label>
            <span>担当ドライバー名</span>
            <input type="text" id="vehicleDriverName" placeholder="例: 菊池" />
          </label>

          <label>
            <span>LINE ID</span>
            <input type="text" id="vehicleLineId" placeholder="例: @kikuchi" />
          </label>

          <label>
            <span>状態</span>
            <select id="vehicleStatus">
              <option value="waiting">待機</option>
              <option value="running">稼働中</option>
              <option value="maintenance">整備中</option>
            </select>
          </label>

          <label>
            <span>乗車可能人数（ドライバー除く）</span>
            <select id="vehicleSeatCapacity">
              <option value="4">4人</option>
              <option value="5">5人</option>
              <option value="6">6人</option>
            </select>
          </label>

          <label>
            <span>帰宅方面</span>
            <input type="text" id="vehicleHomeArea" placeholder="例: 柏 / 松戸 / 船橋" />
          </label>

          <label class="full">
            <span>メモ</span>
            <textarea id="vehicleMemo"></textarea>
          </label>
        </div>

        <div class="row wrap">
          <button id="saveVehicleBtn" class="btn">保存</button>
          <button id="cancelVehicleEditBtn" class="btn secondary hidden">編集キャンセル</button>
        </div>

        <div id="vehiclesList" class="list"></div>
      </div>
    </section>

    <!-- 走行管理 -->
    <section id="drivingTab" class="tab-panel">
      <div class="card">
        <h2>走行管理</h2>

        <div class="grid two">
          <label>
            <span>報告日</span>
            <input type="date" id="reportDate" />
          </label>

          <label>
            <span>車両</span>
            <select id="reportVehicleSelect">
              <option value="">選択してください</option>
            </select>
          </label>

          <label>
            <span>ドライバー名</span>
            <input type="text" id="reportDriverName" placeholder="例: 菊池" />
          </label>

          <label>
            <span>1日の走行距離（km）</span>
            <input type="number" step="0.1" id="reportDistanceKm" />
          </label>

          <label class="full">
            <span>メモ</span>
            <textarea id="reportNote"></textarea>
          </label>
        </div>

        <div class="row wrap">
          <button id="saveDailyReportBtn" class="btn">走行距離を保存</button>
          <button id="loadDailyReportsBtn" class="btn secondary">一覧更新</button>
        </div>

        <hr />

        <h3>本日の報告一覧</h3>
        <div id="dailyReportsList" class="list"></div>

        <hr />

        <h3>今月の平均距離</h3>
        <div id="monthlyAverageList" class="list"></div>
      </div>
    </section>

    <!-- 履歴 -->
    <section id="historyTab" class="tab-panel">
      <div class="card">
        <h2>履歴</h2>
        <div id="historyList" class="list"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
