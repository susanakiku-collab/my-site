<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THEMIS AI Dispatch | Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <h1>THEMIS AI Dispatch</h1>
      <p class="sub">配車ダッシュボード</p>
    </div>

    <div class="top-actions">
      <span id="userEmail" class="muted"></span>
      <button id="logoutBtn" class="btn danger">ログアウト</button>
    </div>
  </header>

  <main class="container">
    <nav class="tabs">
      <button class="tab active" data-tab="dispatchTab">配車</button>
      <button class="tab" data-tab="castsTab">キャスト管理</button>
      <button class="tab" data-tab="historyTab">履歴</button>
    </nav>

    <section id="dispatchTab" class="tab-panel active">
      <div class="card">
        <h2>今日の配車</h2>

        <div class="grid two">
          <label>
            <span>日付</span>
            <input type="date" id="dispatchDate" />
          </label>

          <label>
            <span>ドライバー名</span>
            <input type="text" id="driverName" placeholder="例: 菊池" />
          </label>
        </div>

        <div class="row wrap">
          <button id="createDispatchBtn" class="btn">配車作成</button>
          <button id="loadDispatchBtn" class="btn secondary">配車読込</button>
          <button id="optimizeBtn" class="btn">AI並び替え</button>
        </div>

        <hr />

        <div class="grid two">
          <label>
            <span>キャスト選択</span>
            <select id="castSelect"></select>
          </label>

          <label>
            <span>順番</span>
            <input type="number" id="stopOrder" min="1" value="1" />
          </label>
        </div>

        <div class="row wrap">
          <button id="addCastBtn" class="btn">配車に追加</button>
        </div>

        <div id="dispatchSummary" class="summary-box muted"></div>
        <div id="dispatchList" class="list"></div>
      </div>
    </section>

    <section id="castsTab" class="tab-panel">
      <div class="card">
        <h2>キャスト管理</h2>

        <div class="grid two">
          <label>
            <span>名前</span>
            <input type="text" id="castName" />
          </label>

          <label>
            <span>電話番号</span>
            <input type="text" id="castPhone" />
          </label>

          <label class="full">
            <span>住所</span>
            <input
              type="text"
              id="castAddress"
              placeholder="例: 東京都葛飾区鎌倉2丁目15-13"
            />
          </label>

          <label class="full">
            <span>Google Mapsから取得した座標を貼り付け</span>
            <input
              type="text"
              id="castLatLngText"
              placeholder="例: 35.742891,139.876123"
            />
          </label>

          <label>
            <span>方面</span>
            <input type="text" id="castArea" placeholder="柏方面 / 松戸方面 / 市川・東京方面" />
          </label>

          <label>
            <span>緯度</span>
            <input type="number" step="any" id="castLat" />
          </label>

          <label>
            <span>経度</span>
            <input type="number" step="any" id="castLng" />
          </label>

          <label class="full">
            <span>メモ</span>
            <textarea id="castMemo"></textarea>
          </label>
        </div>

        <div class="row wrap">
          <button id="openGoogleMapBtn" class="btn secondary">Google Mapsで確認</button>
          <button id="applyLatLngBtn" class="btn secondary">貼り付け座標を反映</button>
          <button id="saveCastBtn" class="btn">保存</button>
          <button id="cancelEditBtn" class="btn secondary hidden">編集キャンセル</button>
        </div>

        <hr />

        <h3>CSV一括取込</h3>
        <p class="muted">ヘッダー例: name,phone,address,area,latitude,longitude,memo</p>

        <div class="row wrap">
          <input type="file" id="csvFileInput" accept=".csv,text/csv" />
          <button id="importCsvBtn" class="btn">CSV取込</button>
        </div>

        <div id="castsList" class="list"></div>
      </div>
    </section>

    <section id="historyTab" class="tab-panel">
      <div class="card">
        <h2>配車履歴</h2>
        <div id="historyList" class="list"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
