<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THEMIS AI Dispatch</title>
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1>THEMIS AI Dispatch</h1>
      <div class="topbar-actions">
        <span id="userEmail" class="muted"></span>
        <button id="logoutBtn" class="btn danger hidden">ログアウト</button>
      </div>
    </header>

    <main class="page">
      <section id="loginView" class="card">
        <h2>ログイン</h2>
        <div class="form-grid">
          <label>
            <span>メールアドレス</span>
            <input type="email" id="loginEmail" placeholder="example@email.com" />
          </label>

          <label>
            <span>パスワード</span>
            <input type="password" id="loginPassword" placeholder="password" />
          </label>

          <div class="row gap">
            <button id="loginBtn" class="btn">ログイン</button>
            <button id="signupBtn" class="btn secondary">新規登録</button>
          </div>
          <p id="authMessage" class="muted"></p>
        </div>
      </section>

      <section id="mainView" class="hidden">
        <nav class="tabs">
          <button class="tab active" data-tab="dispatchTab">今日の配車</button>
          <button class="tab" data-tab="castsTab">キャスト管理</button>
          <button class="tab" data-tab="historyTab">配車履歴</button>
        </nav>

        <section id="dispatchTab" class="tab-panel active">
          <div class="card">
            <h2>今日の配車</h2>
            <div class="form-grid two">
              <label>
                <span>日付</span>
                <input type="date" id="dispatchDate" />
              </label>
              <label>
                <span>ドライバー名</span>
                <input type="text" id="driverName" placeholder="例: 菊池" />
              </label>
            </div>

            <div class="row gap wrap">
              <button id="createDispatchBtn" class="btn">配車作成</button>
              <button id="loadTodayDispatchBtn" class="btn secondary">今日を読込</button>
            </div>

            <hr />

            <div class="form-grid two">
              <label>
                <span>キャスト選択</span>
                <select id="castSelect"></select>
              </label>
              <label>
                <span>順番</span>
                <input type="number" id="stopOrder" min="1" value="1" />
              </label>
            </div>

            <div class="row gap wrap">
              <button id="addCastToDispatchBtn" class="btn">配車に追加</button>
            </div>

            <div id="dispatchList" class="list"></div>
          </div>
        </section>

        <section id="castsTab" class="tab-panel">
          <div class="card">
            <h2>キャスト管理</h2>

            <div class="form-grid two">
              <label>
                <span>名前</span>
                <input type="text" id="castName" />
              </label>
              <label>
                <span>電話番号</span>
                <input type="text" id="castPhone" />
              </label>
              <label class="full">
                <span>住所</span>
                <input type="text" id="castAddress" placeholder="千葉県松戸市..." />
              </label>
              <label>
                <span>方面</span>
                <input type="text" id="castArea" placeholder="柏 / 松戸 / 市川 など" />
              </label>
              <label>
                <span>緯度</span>
                <input type="number" step="any" id="castLat" />
              </label>
              <label>
                <span>経度</span>
                <input type="number" step="any" id="castLng" />
              </label>
              <label class="full">
                <span>メモ</span>
                <textarea id="castMemo"></textarea>
              </label>
            </div>

            <div class="row gap wrap">
              <button id="geocodeBtn" class="btn secondary">住所から座標取得</button>
              <button id="saveCastBtn" class="btn">保存</button>
            </div>

            <div id="castsList" class="list"></div>
          </div>
        </section>

        <section id="historyTab" class="tab-panel">
          <div class="card">
            <h2>配車履歴</h2>
            <div id="historyList" class="list"></div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
